    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALTRACK VT | 전술 가이드 & 로그</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ade80;
            --primary-glow: rgba(74, 222, 128, 0.5);
            --bg-dark: #080c10;
            --bg-panel: rgba(15, 25, 30, 0.95);
            --bg-card: rgba(25, 45, 55, 0.6);
            --text-main: #f0f7f2;
            --text-dim: #8ba396;
            --border-glass: rgba(74, 222, 128, 0.15);
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .bg-mesh { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 10% 10%, rgba(74, 222, 128, 0.1) 0%, transparent 50%), radial-gradient(circle at 90% 90%, rgba(0, 245, 212, 0.05) 0%, transparent 50%); background-color: var(--bg-dark); }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: #0a0f14; border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; padding: 50px 0; z-index: 100; }
        .logo-container { padding: 0 40px 60px; display: flex; align-items: center; gap: 15px; }
        .logo-box { width: 48px; height: 48px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Rajdhani'; font-weight: 900; font-size: 26px; color: var(--bg-dark); box-shadow: 0 0 25px var(--primary-glow); }
        .logo-text { font-family: 'Rajdhani'; font-size: 24px; font-weight: 800; letter-spacing: 2px; }
        .nav-list { list-style: none; flex: 1; }
        .nav-item { padding: 20px 40px; cursor: pointer; display: flex; align-items: center; gap: 18px; color: var(--text-dim); transition: 0.3s; font-size: 16px; font-weight: 700; }
        .nav-item:hover { color: var(--text-main); background: rgba(74, 222, 128, 0.04); }
        .nav-item.active { color: var(--primary); background: rgba(74, 222, 128, 0.08); border-right: 4px solid var(--primary); }

        /* Main Container */
        .main-container { flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
        .content-area { padding: 80px 60px; width: 100%; max-width: 1300px; margin: 0 auto; }
        h2.page-title { font-size: 48px; font-weight: 900; margin-bottom: 50px; }
        h2.page-title span { color: var(--primary); }

        /* Tab Content */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* Lineup UI */
        .map-nav { display: flex; gap: 12px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 15px; }
        .map-btn { padding: 14px 28px; background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: 40px; color: var(--text-dim); cursor: pointer; font-weight: 700; transition: 0.3s; white-space: nowrap; }
        .map-btn.active { background: var(--primary); color: var(--bg-dark); box-shadow: 0 0 20px var(--primary-glow); }

        .lineup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .lineup-card { background: var(--bg-panel); border: 1px solid var(--border-glass); border-radius: 24px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .lineup-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .lineup-visual { height: 220px; background: #111; overflow: hidden; position: relative; }
        .lineup-visual img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .agent-tag { position: absolute; top: 20px; left: 20px; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 900; }
        .tag-viper { background: #22c55e; color: #fff; }
        .tag-brim { background: #f97316; color: #fff; }
        .lineup-body { padding: 30px; }
        .lineup-body h4 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
        .lineup-body p { color: var(--text-dim); line-height: 1.7; }

        /* Comps UI */
        .comp-grid { display: grid; gap: 30px; }
        .comp-entry { background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); border-radius: 28px; padding: 40px; cursor: pointer; transition: 0.3s; }
        .comp-entry:hover { background: rgba(74, 222, 128, 0.05); border-color: var(--primary); }
        .comp-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .map-name-lg { font-size: 32px; font-weight: 900; color: var(--primary); }
        .agent-team { display: flex; gap: 10px; flex-wrap: wrap; }
        .agent-label { padding: 8px 16px; background: var(--bg-dark); border: 2px solid var(--primary); border-radius: 12px; font-size: 14px; font-weight: 900; color: var(--primary); }

        /* Gallery/Log UI */
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn-plus { background: var(--primary); color: var(--bg-dark); border: none; padding: 16px 32px; border-radius: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 20px var(--primary-glow); }
        .log-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
        .log-item { background: var(--bg-panel); border: 1px solid var(--border-glass); border-radius: 24px; padding: 30px; position: relative; }
        .log-date-txt { font-family: 'Rajdhani'; font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 20px; }
        .log-row { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .row-box { text-align: center; }
        .row-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .row-val { font-size: 24px; font-weight: 900; font-family: 'Rajdhani'; }
        .val-plus { color: #4ade80; } .val-minus { color: #f87171; } .val-white { color: #fff; }
        .log-memo-p { font-size: 14px; color: var(--text-dim); font-style: italic; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }

        /* Detailed Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(25px); overflow-y: auto; padding: 40px 0; }
        .modal.active { display: flex; }
        .modal-large { background: #0f171e; border: 2px solid var(--primary); border-radius: 36px; padding: 60px; width: 90%; max-width: 1000px; position: relative; }
        .close-btn { position: absolute; top: 30px; right: 40px; font-size: 30px; cursor: pointer; color: var(--text-dim); }
        
        .modal-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 50px; }
        .detail-visual { border-radius: 20px; overflow: hidden; border: 1px solid var(--border-glass); position: relative; }
        .detail-visual img { width: 100%; height: auto; }
        .aim-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .crosshair { width: 40px; height: 40px; border: 2px solid var(--primary); border-radius: 50%; opacity: 0; transition: 0.5s; }
        .crosshair::after { content: '+'; color: var(--primary); font-size: 24px; font-weight: 400; }
        .modal.active .crosshair { opacity: 1; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); box-shadow: 0 0 0px var(--primary); } to { transform: scale(1.2); box-shadow: 0 0 20px var(--primary); } }

        .detail-info h3 { font-size: 36px; color: var(--primary); margin-bottom: 20px; }
        .strategy-box { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 30px; margin-top: 20px; }
        .strategy-box h5 { color: var(--primary); margin-bottom: 15px; font-size: 18px; text-transform: uppercase; }
        .strategy-box p { color: var(--text-dim); line-height: 1.8; font-size: 15px; }

        .agent-profile-list { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .agent-p-item { display: flex; align-items: center; gap: 20px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; }
        .agent-p-name { width: 100px; font-weight: 800; color: var(--primary); }
        .agent-p-role { font-size: 14px; color: var(--text-dim); border-left: 1px solid rgba(255,255,255,0.1); padding-left: 20px; }

        /* Legacy Record Modal */
        .record-modal-box { background: #0f171e; border: 2px solid var(--primary); border-radius: 32px; padding: 50px; width: 450px; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: 800; color: #8ba396; }
        .input-text { width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); border-radius: 12px; color: #fff; font-size: 16px; outline: none; }
    </style>
</head>
<body>

    <script>
        const MAP_GUIDES = [
            { id: 'ascent', agent: 'viper', name: '바이퍼', type: '각독', title: 'A사이트 상자 각독', desc: 'A메인 난간 뒤에서 시작되는 프리미엄 각독.', long_desc: '이 각독은 A메인 입구 뒤쪽 모서리에 몸을 고정하고, 하늘의 전선 교차점과 벽 끝자락 사이에 에임을 둡니다. 점프 없이 발사하면 설치 구역 정중앙에 수 밀리초 내로 도달합니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 하늘의 전선 교차점 [A] 지점에 조준하세요.' },
            { id: 'ascent', agent: 'brim', name: '브림스톤', type: '각폭', title: 'B사이트 기본 각폭', desc: 'B메인 입구 계단에서 조준하는 기본 전술.', long_desc: 'B메인 계단 중간 지점에서 창문 틀 오른쪽 하단 모서리에 조준 실선을 맞춥니다. 브림스톤의 소이탄은 바운드 없이 설치 구역을 덮어버립니다.', img: 'l_brim_ascent.png', pov: '1인칭 시점: 창문 오른쪽 아래 모서리를 조준하면 됩니다.' },
            { id: 'bind', agent: 'brim', name: '브림스톤', type: '각폭', title: 'A사이트 숏 각폭', desc: 'A숏 트럭 뒤를 겨냥한 강력한 폭발.', long_desc: 'A숏 입구 왼쪽 벽에 밀착한 뒤, 안테나 끝부분에 에임을 고정하세요. 트럭 근축의 모든 해제 작업을 원천 차단합니다.', img: 'l_brim_bind.png', pov: '1인칭 시점: 안테나의 세 번째 살 부분을 조준하고 발사하세요.' },
            { id: 'haven', agent: 'viper', name: '바이퍼', type: '각독', title: 'C사이트 롱 각독', desc: '가장 먼 거리에서 발사하는 고급 전술.', long_desc: 'C롱 입구 구석 바위 위에서 하늘의 산맥 능선과 구름이 만나는 지점에 크로스헤어를 둡니다. 거리가 멀어 도착 시간이 늦으므로 미리 쏘는 센스가 필요합니다.', img: 'l_viper_haven.png', pov: '1인칭 시점: 산 능선의 뾰족한 부분 바로 위 구름을 조준하세요.' },
            { id: 'split', agent: 'viper', name: '바이퍼', type: '각독', title: 'A사이트 기본설 각독', desc: 'A메인 통로 박스에서 발사하는 기본 가이드.', long_desc: 'A메인 입구 오른쪽 박스 모서리에 붙어서, 정면 건물의 환풍구 끝부분에 에임을 조준하고 발사합니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 건물 환풍구의 오른쪽 모서리를 조준하세요.' },
            { id: 'icebox', agent: 'viper', name: '바이퍼', type: '각독', title: 'B사이트 옐로우 박스 각독', desc: '철골 구조 위에서 발사하여 설해제를 차단합니다.', long_desc: '컨테이너 벨트 끝부분에서 노란색 박스 위쪽 철골 이음새에 에임을 두고 던집니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 철골 구조물의 T자 이음새를 조준하세요.' },
            { id: 'breeze', agent: 'viper', name: '바이퍼', type: '각독', title: 'A사이트 중거리 각독', desc: '피라미드 뒤 설해제 완벽 차단.', long_desc: '동굴 입구 왼쪽 바위 틈에서 피라미드 꼭대기 오른쪽 끝부분에 에임을 맞춥니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 피라미드 상단의 뾰족한 부분을 조준하세요.' },
            { id: 'lotus', agent: 'viper', name: '바이퍼', type: '각독', title: 'C사이트 마운드 각독', desc: '마운드 뒤 안전한 곳에서 발사.', long_desc: 'C마운드 뒤쪽 돌기둥에 붙어서 하늘의 사원 문양 끝자락에 조준합니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 사원 문양의 가장 윗부분을 조준하세요.' },
            { id: 'sunset', agent: 'viper', name: '바이퍼', type: '각독', title: 'A사이트 박스 각독', desc: 'A메인 입구 박스에서 발사.', long_desc: 'A메인 계단 옆 첫 번째 박스에서 난간 위의 작은 전구에 에임을 맞추고 발사합니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 난간 조명의 중앙을 조준하세요.' },
            { id: 'abyss', agent: 'viper', name: '바이퍼', type: '각독', title: 'A사이트 롱 절벽 각독', desc: '절벽 끝에서 발사하는 정교한 각독.', long_desc: '절벽 옆 울타리 세 번째 칸에서 하늘의 푸른 수정 조각에 에임을 고정하고 발사합니다.', img: 'l_viper_ascent.png', pov: '1인칭 시점: 부유하는 수정 조각의 하단을 조준하세요.' }
        ];

        const RECOMMENDED_COMPS = [
            { map: '어센트', agents: ['제트', '소바', '킬조이', '오멘', '케이오'], strategy: '정보 수집과 사이트 고정의 정석', long_why: '어센트는 미드와 메인 컨트롤이 생명입니다. 소바의 리콘과 케이오의 단검으로 적의 위치를 파악하고, 오멘의 원거리 연막으로 제트의 진입 공간을 확보합니다. 킬조이는 상대적으로 취약한 백사이트를 포탑으로 완벽히 수비합니다.', roles: [{n:'제트', r:'메인 타격대 - 엔트리 및 공간 창출'},{n:'소바', r:'척후병 - 정보 수집 및 리콘'},{n:'킬조이', r:'감시자 - 사이트 무력화 및 뒷라인'},{n:'오멘', r:'전략가 - 원거리 연막 및 연계'},{n:'케이오', r:'척후병 - 스킬 무력화 및 섬광 연계'}] },
            { map: '바인드', agents: ['레이즈', '바이퍼', '브림스톤', '스카이', '게코'], strategy: '2전략가 체제의 압도적 구역 장악', long_why: '장막을 활용한 바이퍼와 3연막의 브림스톤이 결합하여 상대의 모든 시야를 차단합니다. 좁은 골목이 많은 바인드 특성상 레이즈의 페인트탄과 게코의 스킬 연계가 폭발적인 위력을 발휘합니다.', roles: [{n:'레이즈', r:'메인 타격대 - 광역 폭발 및 진입'},{n:'바이퍼', r:'전략가 - 장막을 통한 시야 분할'},{n:'브림스톤', r:'전략가 - 3연막 및 각폭 연계'},{n:'스카이', r:'척후병 - 정보 수집 및 서포트 섬광'},{n:'게코', r:'척후병 - 스킬 재사용 중심의 무력화'}] },
            { map: '헤이븐', agents: ['제트', '브리치', '킬조이', '오멘', '소바'], strategy: '3사이트 방어를 위한 넓은 수비 범위', long_why: '헤이븐은 3개의 사이트를 수비해야 하므로 킬조이의 함정과 소바의 화살이 필수적입니다. 브리치는 좁은 길목에서 압도적인 무력화를 선사합니다.', roles: [{n:'제트', r:'메인 타격대 - 전 구역 타격 지원'},{n:'브리치', r:'척후병 - 벽 관통 무력화 전문가'},{n:'킬조이', r:'감시자 - C사이트 독자 방어'},{n:'오멘', r:'전략가 - 연막 및 유동적 위치 선정'},{n:'소바', r:'척후병 - 장거리 정보 수집'}] },
            { map: '스플릿', agents: ['레이즈', '제트', '오멘', '스카이', '사이퍼'], strategy: '헤븐(고지대) 점령을 위한 강력한 엔트리', long_why: '스플릿은 헤븐 주권을 뺏는 것이 중요합니다. 레이즈와 제트의 더블 타격대로 빠르게 고지대를 점령하고 사이퍼의 함정으로 뒤를 막습니다.', roles: [{n:'레이즈', r:'타격대 - 고지대 구역 클리어'},{n:'제트', r:'타격대 - 빠르고 과감한 램프 진입'},{n:'오멘', r:'전략가 - 원웨이 연막 및 어둠의 발자국'},{n:'스카이', r:'척후병 - 정보 및 힐 지원'},{n:'사이퍼', r:'감시자 - 하단 및 뒤라인 정보 차단'}] },
            { map: '아이스박스', agents: ['제트', '소바', '킬조이', '바이퍼', '세이지'], strategy: '수직적 맵 구조를 극복하는 유틸리티 조합', long_why: '바이퍼의 장막과 세이지의 벽은 아이스박스 설구역의 각을 좁히는 데 필수적입니다. 소바의 화살은 복잡한 박스 뒤의 적을 찾아냅니다.', roles: [{n:'제트', r:'타격대 - 튜브 및 벨트 입구 장악'},{n:'소바', r:'척후병 - 드론을 이용한 A메인 선점'},{n:'킬조이', r:'감시자 - 주방 및 미드 홀딩'},{n:'바이퍼', r:'전략가 - 주 연막 및 각독 수비'},{n:'세이지', r:'감시자 - 설 구역 벽 설치 수비'}] },
            { map: '브리즈', agents: ['제트', '소바', '사이퍼', '바이퍼', '케이오'], strategy: '광활한 사이트를 가르는 장거리 정보력', long_why: '브리즈는 시야가 매우 넓어 바이퍼의 긴 장막이 필수입니다. 사이퍼는 넓은 수비 범위를 카메라 한 대로 커버할 수 있어 선호됩니다.', roles: [{n:'제트', r:'타격대 - 피라미드 및 롱 진입'},{n:'소바', r:'척후병 - 넓은 필드 정보 수집'},{n:'사이퍼', r:'감시자 - A/B 동시 함정 수비'},{n:'바이퍼', r:'전략가 - 전 구역 시야 분할'},{n:'케이오', r:'척후병 - 장거리 스킬 봉쇄'}] },
            { map: '프랙처', agents: ['레이즈', '브리치', '브림스톤', '페이드', '킬조이'], strategy: '양옆 포위 공격을 방어하는 강력한 무력화', long_why: '프랙처는 적이 양방향에서 들어오므로 브리치의 광역 뇌진탕이 효과적입니다. 페이드의 귀신으로 적의 기습을 미리 차단합니다.', roles: [{n:'레이즈', r:'타격대 - 좁은 통로 화력 투사'},{n:'브리치', r:'척후병 - 프랙처 최고의 무기'},{n:'브림스톤', r:'전략가 - 3연막을 이용한 포위망 형성'},{n:'페이드', r:'척후병 - 신속한 추적 및 시야 차단'},{n:'킬조이', r:'감시자 - 타워 및 발전기 수비'}] },
            { map: '펄', agents: ['제트', '페이드', '킬조이', '아스트라', '케이오'], strategy: 'B롱 롱레인지 싸움과 A사이트 난전을 위한 밸런스', long_why: 'B롱의 먼 거리를 아스트라의 중력샘으로 견제하고, 좁은 통로가 많은 A사이트는 페이드의 기동력으로 뚫어냅니다.', roles: [{n:'제트', r:'타격대 - B롱 기습 및 A 진입'},{n:'페이드', r:'척후병 - 복잡한 골목 정보 확인'},{n:'킬조이', r:'감시자 - 사이트 내부 설치 수비'},{n:'아스트라', r:'전략가 - 맵 전체 유틸리티 지원'},{n:'케이오', r:'척후병 - 궁극기를 이용한 한타 장악'}] },
            { map: '로터스', agents: ['레이즈', '바이퍼', '오멘', '스카이', '킬조이'], strategy: '3개 사이트 간의 빠른 백업과 회전 중시', long_why: '회전문과 파괴 가능한 벽이 있는 로터스에서는 오멘의 이동기가 빛을 발합니다. 바이퍼는 넓은 C롱 입구를 차단하는 데 적합합니다.', roles: [{n:'레이즈', r:'타격대 - C사이트 브리칭'},{n:'바이퍼', r:'전략가 - C롱 각독 및 장막 지원'},{n:'오멘', r:'전략가 - 빠른 로테이션 및 연막'},{n:'스카이', r:'척후병 - 드론을 이용한 회전문 정보'},{n:'킬조이', r:'감시자 - 미드 및 B사이트 고정'}] },
            { map: '선셋', agents: ['레이즈', '게코', '브리치', '오멘', '사이퍼'], strategy: '중앙 컨트롤을 통한 맵 주도권 확보', long_why: '선셋은 중앙 구역을 먹는 팀이 이깁니다. 게코의 스킬 회수 능력으로 중앙에서 끊임없이 싸울 수 있는 환경을 만듭니다.', roles: [{n:'레이즈', r:'타격대 - 방 보관실 클리어'},{n:'게코', r:'척후병 - 지속적인 스킬 압박'},{n:'브리치', r:'척후병 - 사각지대 뇌진탕 지원'},{n:'오멘', r:'전략가 - 중앙 연막 및 텔포 기습'},{n:'사이퍼', r:'감시자 - A/B 메인 함정 고정'}] },
            { map: '어비스', agents: ['제트', '소바', '사이퍼', '오멘', '케이오'], strategy: '낭떠러지 위험을 극복하는 고지대 점령', long_why: '최근 추가된 어비스에서는 고지대 선점이 매우 중요합니다. 제트의 기동력과 소바의 정보력이 낙사 위험을 줄여줍니다.', roles: [{n:'제트', r:'타격대 - 수직적 진입 및 기습'},{n:'소바', r:'척후병 - 벽 뒤 사각지대 리콘'},{n:'사이퍼', r:'감시자 - 좁은 통로 함정 설치'},{n:'오멘', r:'전략가 - 낙사 유도 및 연막 컨트롤'},{n:'케이오', r:'척후병 - 상대의 생존기 봉쇄'}] }
        ];

        let userLogs = JSON.parse(localStorage.getItem('vt_korean_logs') || '[]');

        function switchPage(p, el) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            el.classList.add('active');
            if(p === 'lineups') loadMap('ascent', document.querySelector('.map-btn'));
            if(p === 'comps') renderComps();
            if(p === 'gallery') renderLogs();
        }

        function loadMap(mid, btn) {
            document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const disp = document.getElementById('lineup-display');
            const data = MAP_GUIDES.filter(g => g.id === mid);
            if(data.length === 0) { disp.innerHTML = `<div style="grid-column: 1/-1; padding: 100px; text-align: center; color: var(--text-dim); background: rgba(255,255,255,0.02); border-radius: 20px;">준비 중입니다.</div>`; return; }
            disp.innerHTML = data.map((g, i) => `<div class="lineup-card" onclick="openLineupDetail('${g.id}', '${g.title}')"><div class="lineup-visual"><img src="${g.img}"><div class="agent-tag ${g.agent === 'viper' ? 'tag-viper' : 'tag-brim'}">${g.name} | ${g.type}</div></div><div class="lineup-body"><h4>${g.title}</h4><p>${g.desc}</p></div></div>`).join('');
        }

        function renderComps() {
            const disp = document.getElementById('comp-display');
            disp.innerHTML = RECOMMENDED_COMPS.map(c => `<div class="comp-entry" onclick="openCompDetail('${c.map}')"><div class="comp-top"><div class="map-name-lg">${c.map}</div><div class="agent-team">${c.agents.map(a => `<div class="agent-label">${a}</div>`).join('')}</div></div><p style="color:var(--text-dim);">${c.strategy}</p></div>`).join('');
        }

        function openLineupDetail(mapId, title) {
            const item = MAP_GUIDES.find(g => g.title === title);
            const content = `<div class="modal-grid"><div class="detail-visual"><img src="${item.img}"><div class="aim-overlay"><div class="crosshair"></div></div><p style="margin-top:20px; color:var(--primary); font-weight:700; text-align:center;">${item.pov}</p></div><div class="detail-info"><h3>${item.title} <span>DASHBOARD</span></h3><div class="strategy-box"><h5>TACTICAL GUIDE</h5><p>${item.long_desc}</p></div><div class="strategy-box" style="margin-top:20px; border:1px dashed var(--primary);"><h5>TIP</h5><p>해당 위치는 1인칭 조준점이 가장 중요합니다. 크로스헤어를 에임 포인트에 정확히 일치시키세요.</p></div></div></div>`;
            document.getElementById('modal-body-content').innerHTML = content;
            document.getElementById('detail-modal').classList.add('active');
        }

        function openCompDetail(mapName) {
            const item = RECOMMENDED_COMPS.find(c => c.map === mapName);
            const content = `<h3>${item.map} <span>전술 분석</span></h3><div class="strategy-box"><h5>STRATEGY WHY</h5><p>${item.long_why}</p></div><div class="agent-profile-list">${item.roles.map(r => `<div class="agent-p-item"><div class="agent-p-name">${r.n}</div><div class="agent-p-role">${r.r}</div></div>`).join('')}</div>`;
            document.getElementById('modal-body-content').innerHTML = content;
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeDetailModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function renderLogs() { const disp = document.getElementById('log-display'); if(userLogs.length === 0) { disp.innerHTML = `<div style="grid-column:1/-1; padding:100px; text-align:center;">기록이 없습니다.</div>`; return; } disp.innerHTML = userLogs.map((l, i) => `<div class="log-item"><div class="log-date-txt">${l.date}</div><div class="log-row"><div class="row-box"><span class="row-label">LP</span><span class="row-val ${l.lp >= 0 ? 'val-plus' : 'val-minus'}">${l.lp > 0 ? '+' : ''}${l.lp}</span></div><div class="row-box"><span class="row-label">기록</span><span class="row-val val-white">${l.win}승 ${l.loss}패</span></div></div><div class="log-memo-p">" ${l.memo} "</div><button onclick="delLog(${i})" style="position:absolute; top:20px; right:20px; background:none; border:none; color:#ff4655; cursor:pointer;">삭제</button></div>`).join(''); }
        function openLogModal() { document.getElementById('log-modal').classList.add('active'); }
        function closeLogModal() { document.getElementById('log-modal').classList.remove('active'); }
        function saveNewLog() { const lp = parseInt(document.getElementById('lp-in').value) || 0; const win = parseInt(document.getElementById('win-in').value) || 0; const loss = parseInt(document.getElementById('loss-in').value) || 0; const memo = document.getElementById('memo-in').value || "성장 중!"; const entry = { date: new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }), lp, win, loss, memo }; userLogs.unshift(entry); localStorage.setItem('vt_korean_logs', JSON.stringify(userLogs)); renderLogs(); closeLogModal(); }
        function delLog(i) { if(confirm('삭제하시겠습니까?')) { userLogs.splice(i, 1); localStorage.setItem('vt_korean_logs', JSON.stringify(userLogs)); renderLogs(); } }
        window.onload = () => { loadMap('ascent', document.querySelector('.map-btn')); };
    </script>
</body>
</html>
